<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The People Have Spoken | Vote for Ben</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #000; color: #fff; }
        .hero-gradient { background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%); }
        .m5-text { background: linear-gradient(135deg, #fff 0%, #888 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .progress-glow { box-shadow: 0 0 20px rgba(255, 255, 255, 0.2); }
        .transition-all { transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
    </style>
</head>
<body class="hero-gradient min-h-screen flex items-center justify-center p-4">
    <div class="max-w-xl w-full bg-white/5 border border-white/10 rounded-[3rem] p-12 text-center backdrop-blur-xl">
        <h1 class="text-4xl font-extrabold mb-8 m5-text leading-tight">Help Ben Get The MacBook He Deserves</h1>
        
        <div id="voting-panel">
            <p class="text-gray-400 mb-12 text-lg">Should Ben be equipped with an M5 MacBook Air for the good of the developer community?</p>
            
            <a href="https://fast-poll.com/poll/5769be99" target="_blank" id="vote-btn" class="block w-full bg-white text-black py-6 rounded-full text-2xl font-black hover:scale-105 active:scale-95 transition transform">
                YES
            </a>
            <p class="mt-4 text-xs text-gray-600 uppercase tracking-widest">Public consensus is near-unanimous</p>
        </div>

        <div class="mt-16 pt-8 border-t border-white/10">
            <div class="flex justify-between text-sm mb-4 text-gray-500 uppercase tracking-widest font-semibold">
                <span>Community Progress</span>
                <span id="vote-count-text">... / 100 Votes</span>
            </div>
            <div class="w-full bg-white/10 h-4 rounded-full overflow-hidden">
                <div id="progress-bar" class="bg-white h-full transition-all progress-glow" style="width: 0%"></div>
            </div>
            <p class="mt-6 text-sm text-gray-500 italic">"The logic is undeniable." — The Internet</p>
            <a href="/" class="inline-block mt-8 text-gray-400 hover:text-white transition text-sm">← Back to Business Case</a>
        </div>
    </div>

    <script>
        const GOAL = 100;
        const countText = document.getElementById('vote-count-text');
        const progressBar = document.getElementById('progress-bar');

        let lastSeenVotes = 0;

        async function fetchGlobalVotes() {
            try {
                // Fetch from the static JSON file on the same host
                const response = await fetch('/votes.json?nocache=' + Date.now(), {
                    cache: 'no-store'
                });
                
                if (!response.ok) return null;
                
                const data = await response.json();
                return data.total || 0;
            } catch (e) {
                console.warn("Sync error:", e);
                return null;
            }
        }

        function updateUI(votes) {
            if (votes === null || votes === undefined) return;
            
            if (votes !== lastSeenVotes) {
                lastSeenVotes = votes;
                countText.innerText = votes + " / " + GOAL + " Votes";
                const percent = Math.min((votes / GOAL) * 100, 100);
                progressBar.style.width = percent + "%";
            }
        }

        // Initial Load
        fetchGlobalVotes().then(updateUI);

        // Refresh UI every 30 seconds
        setInterval(async () => {
            const votes = await fetchGlobalVotes();
            updateUI(votes);
        }, 30000);
    </script>
</body>
</html>
